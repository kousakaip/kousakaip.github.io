<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Streaming Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">genflix</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">Movies</a>
      <a href="#">Live</a>
      <a href="#">Clips</a>
      <input type="text" placeholder="Search movies, live, clips">
      <button class="subscribe-btn">Subscribe / Topup</button>
    </div>
    <div class="menu-icon">
      ☰
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <!-- Anime Section -->
    <section class="anime-section">
      <h2>Anime by Sushiroll</h2>
      <div class="anime-grid">
        <div class="anime-item">Anime 1</div>
        <div class="anime-item">Anime 2</div>
        <div class="anime-item">Anime 3</div>
        <div class="anime-item">Anime 4</div>
        <div class="anime-item">Anime 5</div>
        <div class="anime-item">Anime 6</div>
      </div>
    </section>

    <!-- Sinema Indonesia Section -->
    <section class="sinema-section">
      <h2>Sinema Indonesia</h2>
      <div class="sinema-grid">
        <div class="sinema-item">Movie 1</div>
        <div class="sinema-item">Movie 2</div>
        <div class="sinema-item">Movie 3</div>
        <div class="sinema-item">Movie 4</div>
        <div class="sinema-item">Movie 5</div>
        <div class="sinema-item">Movie 6</div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
